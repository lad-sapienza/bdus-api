  # ── Geoface ───────────────────────────────────────────────────────────────

  /api/geoface:
    get:
      tags: [geoface]
      summary: Get geodata as GeoJSON for a table
      description: |
        Returns a GeoJSON `FeatureCollection` of all geometries linked to records
        in the given table, optionally filtered by the active search.
        Accepts the same filter params as `GET /api/records/{tb}`.
      parameters:
        - name: tb
          in: query
          required: true
          schema:
            type: string
        - name: search_type
          in: query
          schema:
            type: string
            enum: [all, advanced, sqlExpert]
          description: Search mode. Use `advanced` with `adv` or `sqlExpert` with `querytext`.
        - name: adv
          in: query
          description: Advanced search rows as base64-encoded JSON (search_type=advanced).
          schema:
            type: string
        - name: querytext
          in: query
          description: Raw SQL WHERE clause (search_type=sqlExpert).
          schema:
            type: string
        - name: join
          in: query
          description: Optional SQL JOIN clause (search_type=sqlExpert).
          schema:
            type: string
        - name: 'filter[{field}][{op}]'
          in: query
          description: Directus-style filter (takes priority over search_type).
          schema:
            type: string
      responses:
        '200':
          description: GeoJSON FeatureCollection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      geojson:
                        type: object
                      meta:
                        type: object
                        properties:
                          tb_id:
                            type: string
                          tb_label:
                            type: string
                          canUserEdit:
                            type: boolean
                          id_field:
                            type: string
                          preview_fields:
                            type: array
                            items:
                              type: string
                          has_fuzzy_date:
                            type: boolean
                            description: |
                              True when the fuzzy-date plugin is active for this table.
                              When true, GeofaceView shows the temporal filter slider.
                          layers:
                            type: array
                            items:
                              type: object
                              description: Background map layer configuration.

  /api/geoface/feature:
    post:
      tags: [geoface]
      summary: Create a new geometry feature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tb, id, geometry]
              properties:
                tb:
                  type: string
                id:
                  type: integer
                geometry:
                  type: object
                  description: GeoJSON geometry object
      responses:
        '200':
          description: Feature created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'
    put:
      tags: [geoface]
      summary: Update one or more geometry features
      description: |
        Batch-updates geometries. Each item in the `geodata` array carries
        `id` (the `bdus_geodata` row id) and a GeoJSON geometry object.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [geodata]
              properties:
                geodata:
                  type: array
                  items:
                    type: object
                    required: [id, geometry]
                    properties:
                      id:
                        type: integer
                      geometry:
                        type: object
                        description: GeoJSON geometry object
      responses:
        '200':
          description: Update result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'
    delete:
      tags: [geoface]
      summary: Delete one or more geometry features
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                  description: Array of `bdus_geodata` row IDs to delete
      responses:
        '200':
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

