openapi: 3.1.0

info:
  title: BraDypUS API
  description: |
    REST JSON API for [BraDypUS](https://bdus.cloud) — the open-source web
    database system for archaeological and cultural-heritage research.

    ## Authentication
    All endpoints except `GET /api/auth/apps`, `POST /api/auth/login`,
    `GET /api/auth/oauth/{provider}/redirect`, `GET /api/auth/oauth/{provider}/callback`,
    `GET /api/new-app/status`, and `POST /api/new-app` require a JWT bearer
    token obtained from `POST /api/auth/login` or via the OAuth2 flow.

    API keys (managed via `/api/api-keys`) may be used in place of a JWT for
    programmatic access. They carry an explicit privilege level
    (`read` | `edit` | `admin`) enforced per route.

    ## Common response envelope
    Every response carries a top-level `status` field (`"success"` | `"error"`).
    Error responses additionally carry a `code` string (i18n key) and an
    optional `detail` string.

    ## Table names
    Table names are plain strings (e.g. `us`, `periodi`). The legacy `APP__`
    prefix is not used in v5.
  version: 5.0.0
  license:
    name: GNU AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html
  contact:
    name: LAD – Laboratorio di Archeologia Digitale, Sapienza University of Rome
    url: https://lad.saras.uniroma1.it

servers:
  - url: /
    description: Same-origin (Vite dev-server proxy)
  - url: http://localhost:8080
    description: Docker dev server

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Authentication and session management
  - name: records
    description: Record CRUD and listing
  - name: files
    description: File upload, deletion and sorting
  - name: rs
    description: Stratigraphic relations (Harris matrix)
  - name: manual-links
    description: Manual cross-table links
  - name: search
    description: Search configuration and field-value lookup
  - name: config
    description: Application and table configuration
  - name: charts
    description: Saved charts and on-demand chart data
  - name: backup
    description: Database backup management
  - name: geoface
    description: Geodata (GeoJSON read/write)
  - name: users
    description: User management and per-table privileges
  - name: templates
    description: Record-view layout templates
  - name: vocabularies
    description: Controlled vocabulary management
  - name: saved-queries
    description: Saved search queries
  - name: api-keys
    description: API key management
  - name: import
    description: Bulk data and geodata import
  - name: search-replace
    description: Find-and-replace across a table field
  - name: free-sql
    description: Password-gated free-form SQL execution
  - name: versions
    description: Record version history and point-in-time restore
  - name: system
    description: Application info, history, logs, welcome page, new-app wizard
  - name: migrations
    description: Database migration status (admin)
  - name: config-relations
    description: Cross-table FK relation definitions (config panel)
  - name: config-indexes
    description: User-defined database indexes (config panel)
  - name: zotero
    description: Zotero bibliography integration — library config and per-record citation links
  - name: widgets
    description: Per-app UI widget files (vanilla ES modules)

# ──────────────────────────────────────────────────────────────────────────────
paths:

  # ── Auth ──────────────────────────────────────────────────────────────────

  /api/auth/apps:
    get:
      tags: [auth]
      summary: List available applications
      description: |
        Returns the list of applications available on this server.
        Each entry includes which OAuth2 providers are configured so the
        login UI can display SSO buttons without a separate round-trip.
        No authentication required.
      security: []
      responses:
        '200':
          description: App list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      apps:
                        type: array
                        items:
                          type: object
                          properties:
                            db:
                              type: string
                              description: Internal application identifier
                            name:
                              type: string
                              description: Display name (uppercase)
                            definition:
                              type: string
                              description: Short description of the application
                            oauth:
                              type: array
                              description: OAuth2 providers configured for this app
                              items:
                                type: string
                                enum: [google, orcid]
                              example: [google]
                        example:
                          apps:
                            - db: myapp
                              name: MYAPP
                              definition: Excavation database
                              oauth: [google]

  /api/auth/login:
    post:
      tags: [auth]
      summary: Authenticate and obtain a JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, app]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                app:
                  type: string
                  description: Application name
            example:
              email: admin@example.com
              password: s3cr3t
              app: myapp
      responses:
        '200':
          description: JWT issued
          content:
            application/json:
              schema:
                oneOf:
                  - allOf:
                      - $ref: '#/components/schemas/Success'
                      - type: object
                        required: [token]
                        properties:
                          token:
                            type: string
                            description: Signed JWT, valid for 2 hours
                  - $ref: '#/components/schemas/Error'

  /api/auth/refresh:
    get:
      tags: [auth]
      summary: Refresh the current JWT
      description: Issues a fresh token with a new expiry. The current token must still be valid.
      responses:
        '200':
          description: Refreshed token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    required: [token]
                    properties:
                      token:
                        type: string

  /api/auth/logout:
    get:
      tags: [auth]
      summary: Logout (server-side acknowledgement)
      description: JWT auth is stateless; this endpoint exists as a server-side signal. The client clears its token from sessionStorage.
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /api/auth/oauth/{provider}/redirect:
    get:
      tags: [auth]
      summary: Begin OAuth2 authorization flow
      description: |
        Returns the provider's authorization URL. The client must navigate
        (window.location.href) to that URL to start the SSO flow.

        Supported providers: `google`, `orcid`.

        Provider credentials must be configured in `projects/{app}/config.json`
        under the `oauth` key (see docs/oauth.md).

        No authentication required.
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, orcid]
          example: google
        - name: app
          in: query
          required: true
          schema:
            type: string
          description: Application identifier
          example: myapp
        - name: origin
          in: query
          required: true
          schema:
            type: string
            format: uri
          description: Frontend origin for the post-callback redirect (e.g. https://myapp.example.com)
          example: https://myapp.example.com
      responses:
        '200':
          description: Authorization URL
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    required: [url]
                    properties:
                      url:
                        type: string
                        format: uri
                        description: Provider authorization URL; navigate to this
        '400':
          description: Unsupported provider or missing origin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Provider not configured for this application
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/oauth/{provider}/callback:
    get:
      tags: [auth]
      summary: OAuth2 authorization callback
      description: |
        Callback endpoint registered with the OAuth2 provider.
        Called by the provider after the user grants access.

        On success: issues a BraDypUS JWT and **redirects the browser** to
        `{origin}/#/oauth-callback?token=JWT&app=APP`.

        On failure: redirects to
        `{origin}/#/oauth-callback?error=CODE&app=APP`.

        This endpoint must be added to the provider's allowed redirect URIs
        exactly as: `https://your-host/api/auth/oauth/{provider}/callback?app=APP`

        **User must already exist** in `bdus_users`. For Google, an existing
        account with a matching email is auto-linked on first use. For ORCID,
        the admin must set the `oauth_sub` field in advance (ORCID's public API
        does not expose email).

        No authentication required.
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, orcid]
        - name: app
          in: query
          required: true
          schema:
            type: string
          description: Application identifier (must match the redirect URI)
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code from the provider
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: HMAC-signed state token (generated by the redirect endpoint)
      responses:
        '302':
          description: |
            Browser redirect to the frontend callback route.
            Success: `/#/oauth-callback?token=JWT&app=APP`
            Failure: `/#/oauth-callback?error=CODE&app=APP`
          headers:
            Location:
              schema:
                type: string
                format: uri
        '400':
          description: Invalid request (missing parameters; no origin available for redirect)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── System ────────────────────────────────────────────────────────────────

  /api/info:
    get:
      tags: [system]
      summary: Server version and changelog
      responses:
        '200':
          description: Version info and changelog markdown
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      version:
                        type: string
                        example: 5.0.0
                      changelog:
                        type: string
                        description: Changelog content as Markdown

  /api/info/app:
    get:
      tags: [system]
      summary: Current application metadata
      responses:
        '200':
          description: App info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      app:
                        type: string
                      label:
                        type: string
                      lang:
                        type: string
                      status:
                        type: string
                        enum: [on, off]

  /api/tables:
    get:
      tags: [system]
      summary: List user-visible tables for the home view
      responses:
        '200':
          description: Table list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      tables:
                        type: array
                        items:
                          $ref: '#/components/schemas/TableMeta'

  /api/history:
    get:
      tags: [system]
      summary: Recent edit history for the current user
      responses:
        '200':
          description: History entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      history:
                        type: array
                        items:
                          type: object
                          properties:
                            tb:
                              type: string
                            id:
                              type: integer
                            action:
                              type: string
                            time:
                              type: integer

  /api/welcome:
    get:
      tags: [system]
      summary: Get the welcome-page Markdown content
      responses:
        '200':
          description: Welcome content
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      content:
                        type: string
                        description: Raw Markdown
    put:
      tags: [system]
      summary: Save the welcome-page Markdown content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /api/logs:
    get:
      tags: [system]
      summary: Retrieve application error log entries
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: level
          in: query
          schema:
            type: string
            enum: [error, warning, info, debug]
      responses:
        '200':
          description: Log entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      logs:
                        type: array
                        items:
                          type: object

  /api/logs/purge:
    post:
      tags: [system]
      summary: Purge log entries older than N days
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                days:
                  type: integer
                  default: 30
      responses:
        '200':
          description: Purge result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedSuccess'

  /api/new-app/status:
    get:
      tags: [system]
      summary: Check whether app creation is permitted
      security: []
      responses:
        '200':
          description: Permission status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    required: [permitted]
                    properties:
                      permitted:
                        type: boolean

  /api/new-app:
    post:
      tags: [system]
      summary: Create a new application
      description: Requires `BRADYPUS_ALLOW_NEW_APP=1` on the server.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, definition, email, password, db_engine]
              properties:
                name:
                  type: string
                  pattern: '^[a-z][a-z0-9_]{2,19}$'
                  description: Lowercase alphanumeric slug, 3–20 characters
                definition:
                  type: string
                  description: Short human-readable description of the database
                email:
                  type: string
                  format: email
                password:
                  type: string
                db_engine:
                  type: string
                  enum: [sqlite, mysql, pgsql]
                db_host:
                  type: string
                db_port:
                  type: string
                db_name:
                  type: string
                db_username:
                  type: string
                db_password:
                  type: string
      responses:
        '200':
          description: App created or error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/admin/check-password:
    post:
      tags: [system]
      summary: Verify super-admin password gate
      description: Used before exposing sensitive admin operations in the UI.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        '200':
          description: Password check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  # ── Records ───────────────────────────────────────────────────────────────

  /api/record/{tb}/new:
    get:
      tags: [records]
      summary: Get a blank record scaffold
      parameters:
        - $ref: '#/components/parameters/tb'
      responses:
        '200':
          description: Empty record with field metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordResponse'

  /api/record/{tb}/{id}:
    get:
      tags: [records]
      summary: Fetch a single record by id
      parameters:
        - $ref: '#/components/parameters/tb'
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Record data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordResponse'
    delete:
      tags: [records]
      summary: Delete one or more records
      description: Pass a single integer id in the path. To delete multiple records at once, pass `id` as a repeated query-string parameter.
      parameters:
        - $ref: '#/components/parameters/tb'
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/record/{tb}:
    post:
      tags: [records]
      summary: Create or update a record
      description: Omit `id` to create; include `id` to update.
      parameters:
        - $ref: '#/components/parameters/tb'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [core]
              properties:
                id:
                  type: integer
                  description: Omit to create; provide to update
                core:
                  type: object
                  description: Field name → value map for main table fields
                  additionalProperties: true
                plugins:
                  type: object
                  description: Plugin table name → array of rows
                  additionalProperties:
                    type: array
                    items:
                      type: object
            examples:
              create:
                value:
                  core:
                    sigla: US001
                    periodo: Età contemporanea
                  plugins: {}
              update:
                value:
                  id: 1
                  core:
                    sigla: US001-rev
                  plugins: {}
      responses:
        '200':
          description: Save result with the record id
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CodedResult'
                  - type: object
                    properties:
                      id:
                        type: integer

  /api/records/{tb}:
    get:
      tags: [records]
      summary: List / search records (GET)
      description: |
        Supports pagination, sorting, and filtering via query params.

        ## Search modes

        Set `search_type` to choose the filter strategy:

        | `search_type` | Extra params | Description |
        |---|---|---|
        | `all` (default) | — | Returns all records, no filter |
        | `fast` | `search=TEXT` | Full-text search across preview fields |
        | `advanced` | `adv=BASE64_JSON` | Structured field/operator/value rows |
        | `sqlExpert` | `querytext=SQL` (+ optional `join=SQL`) | Raw SQL WHERE clause |

        ## Directus-style JSON filter (recommended for programmatic use)

        Use URL bracket notation to filter without specifying `search_type`:

        ```
        ?filter[status][_eq]=active
        ?filter[name][_icontains]=pompeii
        ?filter[year][_between][0]=100&filter[year][_between][1]=300
        ?filter[_or][0][type][_eq]=site&filter[_or][1][type][_eq]=find
        ```

        Supported operators: `_eq` `_neq` `_lt` `_lte` `_gt` `_gte`
        `_contains` `_icontains` `_ncontains` `_starts_with` `_ends_with`
        `_in` `_nin` `_null` `_nnull` `_between`.
        Logical: `_and` `_or` (nested arrays).

        Field names are validated against the table config allow-list.
        All values are bound via PDO prepared statements.

        ## Simple equality shortcut

        Any `q_{field}=value` GET param is a shorthand for `filter[field][_eq]=value`.
        Multiple `q_` params are AND-combined.

        ## Column visibility

        Pass `columns=field1,field2` (comma-separated) to override the default
        preview fields and return only the listed columns.
      parameters:
        - $ref: '#/components/parameters/tb'
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 30
            maximum: 200
        - name: sort_field
          in: query
          schema:
            type: string
          description: Field name to sort by
        - name: sort_dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: search_type
          in: query
          schema:
            type: string
            enum: [all, fast, advanced, sqlExpert]
          description: |
            Search mode. See description for details. Ignored when `filter` is present.
        - name: search
          in: query
          description: Full-text search string. Required when `search_type=fast`.
          schema:
            type: string
        - name: adv
          in: query
          description: |
            Advanced search rows encoded as a base64 JSON array of `AdvancedSearchRow` objects.
            Required when `search_type=advanced`.
          schema:
            type: string
        - name: querytext
          in: query
          description: Raw SQL WHERE clause. Required when `search_type=sqlExpert`.
          schema:
            type: string
        - name: join
          in: query
          description: Optional SQL JOIN clause appended before the WHERE clause (sqlExpert mode).
          schema:
            type: string
        - name: 'filter[{field}][{op}]'
          in: query
          description: |
            Directus-style filter. Replace `{field}` with a table field name and
            `{op}` with one of the supported operators (see description).
            Takes priority over `search_type` when present.
          schema:
            type: string
          example: 'filter[sigla][_eq]=US001'
        - name: 'q_{field}'
          in: query
          description: |
            Simple equality shorthand. Replace `{field}` with the actual field name.
            Equivalent to `filter[{field}][_eq]=value`.
          schema:
            type: string
          example: 'q_sigla=US001'
        - name: columns
          in: query
          description: Comma-separated list of field names to return (overrides default preview columns).
          schema:
            type: string
          example: 'id,sigla,periodo'
      responses:
        '200':
          description: Paginated record list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordListResponse'
    post:
      tags: [records]
      summary: List / search records (POST)
      description: |
        Same as GET but accepts the search payload in the request body.
        All GET search parameters (`search_type`, `search`, `adv`, `querytext`, `join`,
        `filter`, `columns`) are accepted both as query params and as body fields.

        **Convenience shorthand**: if the body contains a `search` array
        `[{"field", "operator", "value"}]` and no `search_type`, it is
        auto-converted to the `advanced` format.
      parameters:
        - $ref: '#/components/parameters/tb'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                search_type:
                  type: string
                  enum: [all, fast, advanced, sqlExpert]
                  description: |
                    Search mode. Ignored when `filter` is present.
                    Use `fast` with `search`, `advanced` with `adv`,
                    `sqlExpert` with `querytext` (and optional `join`).
                filter:
                  $ref: '#/components/schemas/FilterObject'
                search:
                  description: |
                    When `search_type=fast`: plain text string for full-text search.
                    When `search_type` is absent: convenience shorthand array of
                    `{field, operator, value, connector?}` objects, auto-converted
                    to `advanced` format.
                  oneOf:
                    - type: string
                      description: Full-text search string (fast mode)
                    - type: array
                      description: Shorthand advanced rows
                      items:
                        type: object
                        required: [field, operator, value]
                        properties:
                          field:
                            type: string
                          operator:
                            type: string
                            example: '='
                          value:
                            type: string
                          connector:
                            type: string
                            enum: [AND, OR]
                            default: AND
                adv:
                  type: array
                  description: Advanced search rows (search_type=advanced)
                  items:
                    $ref: '#/components/schemas/AdvancedSearchRow'
                querytext:
                  type: string
                  description: Raw SQL WHERE clause (search_type=sqlExpert)
                join:
                  type: string
                  description: Optional SQL JOIN clause (search_type=sqlExpert)
                columns:
                  type: array
                  description: Column names to include in the response (overrides preview fields)
                  items:
                    type: string
            examples:
              filter:
                summary: Directus-style filter (POST body)
                value:
                  filter:
                    periodo:
                      _eq: Basso Medioevo
              shorthand:
                summary: Shorthand advanced (convenience format)
                value:
                  search:
                    - field: periodo
                      operator: '='
                      value: Basso Medioevo
              advanced:
                summary: Structured advanced search
                value:
                  search_type: advanced
                  adv:
                    - fld: 'us:periodo'
                      operator: '='
                      value: Basso Medioevo
                      connector: AND
                      '(': ''
                      ')': ''
              sqlExpert:
                summary: Raw SQL WHERE
                value:
                  search_type: sqlExpert
                  querytext: "periodo = 'Basso Medioevo' AND cronologia > 1200"
      responses:
        '200':
          description: Paginated record list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordListResponse'

  /api/records/{tb}/export:
    get:
      tags: [records]
      summary: Export records as a file download
      description: |
        Streams the full result set (no pagination) in the requested format.
        Filtering uses the same Directus-style `filter` or the URL-persistence
        params that DataView encodes into the browser URL (`qt` / `q`).

        | `qt` | `q` value | Description |
        |---|---|---|
        | `fast` | search text | Full-text search |
        | `expert` | SQL WHERE clause | Raw SQL filter |
        | `advanced` | base64-encoded JSON array of `AdvancedSearchRow` | Structured filter |
        | (absent) | — | No filter — export all records |
      parameters:
        - $ref: '#/components/parameters/tb'
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [csv, json, xlsx]
        - name: qt
          in: query
          description: Search type for export. Use `fast`, `expert`, or `advanced` (mirrors DataView URL params).
          schema:
            type: string
            enum: [fast, expert, advanced]
        - name: q
          in: query
          description: Query value corresponding to the selected `qt` mode.
          schema:
            type: string
        - name: 'filter[{field}][{op}]'
          in: query
          description: |
            Directus-style filter (takes priority over `qt`/`q`).
            Same syntax as `GET /api/records/{tb}`.
          schema:
            type: string
      responses:
        '200':
          description: File download (streamed)
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /api/record/{tb}/templates:
    get:
      tags: [records]
      summary: List available layout templates for a table
      parameters:
        - $ref: '#/components/parameters/tb'
      responses:
        '200':
          description: Template list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      templates:
                        type: array
                        items:
                          type: string

  /api/record/{tb}/field-options:
    get:
      tags: [records]
      summary: Fetch async options for a select field
      parameters:
        - $ref: '#/components/parameters/tb'
        - name: field
          in: query
          required: true
          schema:
            type: string
        - name: q
          in: query
          description: Optional search string to filter options
          schema:
            type: string
      responses:
        '200':
          description: Option list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      options:
                        type: array
                        items:
                          type: object
                          properties:
                            value:
                              type: string
                            label:
                              type: string

  /api/record/{tb}/check-unique:
    get:
      tags: [records]
      summary: Check whether a field value is unique in the table
      description: |
        Used by the frontend for live `no_dupl` validation (debounced, 600 ms).
        When `id` is provided the current record is excluded from the count so
        that updating a field with its existing value does not report a conflict.
        The `field` name is validated against the table config to prevent
        column-injection probing.
      parameters:
        - $ref: '#/components/parameters/tb'
        - name: field
          in: query
          required: true
          schema:
            type: string
          description: Name of the field to check
        - name: value
          in: query
          required: true
          schema:
            type: string
          description: Value to test for uniqueness
        - name: id
          in: query
          required: false
          schema:
            type: integer
          description: Current record id — excluded from the uniqueness count (UPDATE scenario)
      responses:
        '200':
          description: Uniqueness result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      unique:
                        type: boolean
                        description: true if no other row has this value in the column
              examples:
                unique:
                  value: { status: success, unique: true }
                duplicate:
                  value: { status: success, unique: false }
      security:
        - bearerAuth: []

  /api/record/{tb}/link-candidates:
    get:
      tags: [records]
      summary: Search records that can be linked to a manual link field
      parameters:
        - $ref: '#/components/parameters/tb'
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: field
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Candidate records
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      records:
                        type: array
                        items:
                          type: object

  # ── Deleted records ──────────────────────────────────────────────────────

  /api/record/{tb}/check-plugins-before-delete:
    get:
      tags: [records]
      summary: Check plugin record counts before deleting a record
      description: |
        Returns the list of plugin tables that contain rows referencing the
        given record (non-zero counts only).  The frontend calls this before
        `DELETE /api/record/{tb}/{id}` to show a confirmation dialog when
        plugin data would be left orphaned.

        Requires `edit` privilege.
      parameters:
        - $ref: '#/components/parameters/tb'
        - name: id
          in: query
          required: true
          schema: { type: integer }
          description: Record id to check
      responses:
        '200':
          description: Plugin count list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      plugins:
                        type: array
                        items:
                          type: object
                          properties:
                            tb:
                              type: string
                            label:
                              type: string
                            count:
                              type: integer

  /api/record/{tb}/deleted:
    get:
      tags: [versions]
      summary: List deleted records that can be restored
      description: >
        Returns one entry per rowid whose most-recent snapshot has
        `operation=delete` and that no longer exists in the main table.
        Use `POST /api/version/{id}/restore` to recover a listed record.
      parameters:
        - name: tb
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: List of recoverable deleted records
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:  { type: string, example: success }
                  deleted:
                    type: array
                    items:
                      type: object
                      properties:
                        version_id: { type: integer }
                        rowid:      { type: integer }
                        userid:     { type: string }
                        time:       { type: string }
                        content:
                          $ref: '#/components/schemas/VersionContent'

  # ── Version history ──────────────────────────────────────────────────────

  /api/record/{tb}/{id}/versions:
    get:
      tags: [versions]
      summary: List recorded versions for a record
      description: >
        Returns all snapshot entries for the given record, newest first.
        Each entry identifies when the snapshot was taken, by whom, and what
        operation triggered it (`update` | `delete` | `restore`).
      parameters:
        - $ref: '#/components/parameters/tb'
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Version list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      versions:
                        type: array
                        items:
                          $ref: '#/components/schemas/VersionEntry'

  /api/version/{id}:
    get:
      tags: [versions]
      summary: Fetch a version snapshot plus the current record state
      description: >
        Returns the full snapshot content for one version entry together with
        the current live state of the same record.  The frontend uses both to
        compute and render the diff.  `current.core` is `null` when the record
        has been deleted since the snapshot was taken.
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Version diff payload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      version:
                        allOf:
                          - $ref: '#/components/schemas/VersionEntry'
                          - type: object
                            properties:
                              content:
                                $ref: '#/components/schemas/VersionContent'
                      current:
                        $ref: '#/components/schemas/VersionContent'

  /api/version/{id}/restore:
    post:
      tags: [versions]
      summary: Restore a record to a previously snapshotted state
      description: >
        Applies values from the chosen snapshot back to the live record.


        **Core fields**: pass an array of field names in `fields` to restore
        only those fields; omit or pass an empty array to restore all core
        fields.  `id` and `creator` are always excluded from writes.


        **Plugins**: pass plugin table names in `restore_plugins` to restore
        those sections (all-or-nothing: current rows deleted, snapshot rows
        re-inserted).  Omit or pass an empty array to leave plugins untouched.


        **Deleted record recovery**: when the target record no longer exists, a
        full INSERT is performed using all snapshot core values (including the
        original `id`) and all snapshot plugins.  The `fields` /
        `restore_plugins` filters are ignored in this case.


        A pre-restore snapshot with `operation=restore` is always saved before
        any write so the action is auditable and itself reversible.
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                fields:
                  type: array
                  items:
                    type: string
                  description: >
                    Core field names to restore.
                    Empty array or omitted → restore all core fields.
                  example: ['name', 'status']
                restore_plugins:
                  type: array
                  items:
                    type: string
                  description: >
                    Plugin table names to restore (all-or-nothing per section).
                    Empty array or omitted → no plugins restored.
                  example: ['tags']
      responses:
        '200':
          description: Restore result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CodedResult'
                  - type: object
                    properties:
                      tb:
                        type: string
                        description: Table name of the restored record
                      id:
                        type: integer
                        description: Primary key of the restored record
                      created:
                        type: boolean
                        description: >
                          `true` when the record did not exist and was
                          re-inserted (deleted-record recovery path).

  # ── Files ────────────────────────────────────────────────────────────────

  /api/record/{tb}/{id}/file:
    post:
      tags: [files]
      summary: Upload a file and attach it to a record
      parameters:
        - $ref: '#/components/parameters/tb'
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/file/{fileId}:
    delete:
      tags: [files]
      summary: Delete an uploaded file
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/files/sort:
    post:
      tags: [files]
      summary: Update the display order of attached files
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                  description: File ids in the desired order
      responses:
        '200':
          description: Sort result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  # ── Stratigraphic Relations (RS) ─────────────────────────────────────────

  /api/record/{tb}/rs:
    post:
      tags: [rs]
      summary: Add a stratigraphic relation between two records
      parameters:
        - $ref: '#/components/parameters/tb'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tb, first, relation, second]
              properties:
                tb:
                  type: string
                first:
                  type: integer
                  description: Id of the first record
                relation:
                  type: integer
                  description: |
                    Relation code:
                    1=is_covered_by, 2=is_cut_by, 3=carries, 4=is_filled_by,
                    5=covers, 6=cuts, 7=leans_against, 8=fills,
                    9=is_the_same_as, 10=is_bound_to
                  minimum: 1
                  maximum: 10
                second:
                  type: integer
                  description: Id of the second record
      responses:
        '200':
          description: Relation added or duplicate error
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CodedResult'
                  - type: object
                    properties:
                      id:
                        type: integer

  /api/rs/{id}:
    delete:
      tags: [rs]
      summary: Delete a stratigraphic relation
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/rs/matrix:
    get:
      tags: [rs]
      summary: Get Harris matrix data for a table
      description: |
        Returns nodes and relations for the Harris matrix visualisation.
        Accepts the same filter params as `GET /api/records/{tb}` so
        DataView can pass its current search state directly.

        Nodes not in the filtered set but connected to in-filter nodes are
        included with `in_filter: false` and displayed with an attenuated style.
      parameters:
        - name: tb
          in: query
          required: true
          schema:
            type: string
        - name: search_type
          in: query
          schema:
            type: string
            enum: [all, fast, advanced, sqlExpert]
          description: Search mode (see `GET /api/records/{tb}` for details).
        - name: search
          in: query
          description: Full-text search string (search_type=fast).
          schema:
            type: string
        - name: adv
          in: query
          description: Advanced search rows as base64-encoded JSON (search_type=advanced).
          schema:
            type: string
        - name: querytext
          in: query
          description: Raw SQL WHERE clause (search_type=sqlExpert).
          schema:
            type: string
        - name: join
          in: query
          description: Optional SQL JOIN clause (search_type=sqlExpert).
          schema:
            type: string
        - name: 'filter[{field}][{op}]'
          in: query
          description: Directus-style filter (takes priority over search_type).
          schema:
            type: string
      responses:
        '200':
          description: Matrix nodes and edges
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      rs_field:
                        type: string
                        description: Name of the field used as stratigraphic identifier.
                      has_fuzzy_date:
                        type: boolean
                        description: |
                          True when the fuzzy-date plugin is active for this table.
                          When true, each node carries `chrono_from`, `chrono_to`,
                          and `chrono_label` for the chronological timeline layout.
                      nodes:
                        type: array
                        items:
                          type: object
                          required: [db_id, identifier, in_filter]
                          properties:
                            db_id:
                              type: integer
                            identifier:
                              type: string
                              description: Value of the rs_field column for this record.
                            in_filter:
                              type: boolean
                              description: |
                                False for nodes that appear only because they are
                                connected to an in-filter node (dangling nodes).
                            chrono_from:
                              type: integer
                              nullable: true
                              description: |
                                Start year (negative = BCE). Present only when
                                `has_fuzzy_date` is true. Null = ante quem or undated.
                            chrono_to:
                              type: integer
                              nullable: true
                              description: |
                                End year. Null = post quem or undated.
                            chrono_label:
                              type: string
                              nullable: true
                              description: Human-readable chronological label.
                      relations:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            first:
                              type: string
                              description: Identifier of the first stratigraphic unit.
                            second:
                              type: string
                              description: Identifier of the second stratigraphic unit.
                            relation:
                              type: integer
                              description: Relation code (1-10, see RS documentation).

  # ── Manual Links ─────────────────────────────────────────────────────────

  /api/manual-link:
    post:
      tags: [manual-links]
      summary: Create a manual cross-table link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tb_one, id_one, tb_two, id_two]
              properties:
                tb_one:
                  type: string
                id_one:
                  type: integer
                tb_two:
                  type: string
                id_two:
                  type: integer
      responses:
        '200':
          description: Link created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/manual-link/{id}:
    delete:
      tags: [manual-links]
      summary: Delete a manual link
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  # ── Search ────────────────────────────────────────────────────────────────

  /api/search/{tb}/config:
    get:
      tags: [search]
      summary: Get search UI configuration for a table
      description: Returns the list of searchable fields and the available operators for the advanced search form.
      parameters:
        - $ref: '#/components/parameters/tb'
      responses:
        '200':
          description: Search config
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      fields:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            label:
                              type: string
                            type:
                              type: string
                      operators:
                        type: array
                        items:
                          type: object
                          properties:
                            value:
                              type: string
                            label:
                              type: string

  /api/search/{tb}/values:
    get:
      tags: [search]
      summary: Get distinct values used in a field
      description: Used to populate suggestion dropdowns in the advanced search form.
      parameters:
        - $ref: '#/components/parameters/tb'
        - name: field
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Distinct values
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      values:
                        type: array
                        items:
                          type: string

  # ── Config ───────────────────────────────────────────────────────────────

  /api/config/app:
    get:
      tags: [config]
      summary: Get application-level properties
      responses:
        '200':
          description: App properties
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      properties:
                        type: object
    put:
      tags: [config]
      summary: Save application-level properties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/config/tables:
    get:
      tags: [config]
      summary: List all tables in the configuration
      responses:
        '200':
          description: Table list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      tables:
                        type: array
                        items:
                          $ref: '#/components/schemas/TableMeta'
    post:
      tags: [config]
      summary: Create a new table
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, label]
              properties:
                name:
                  type: string
                  pattern: '^[a-z][a-z0-9_]*$'
                label:
                  type: string
                is_plugin:
                  type: string
                  enum: ['0', '1']
                  default: '0'
      responses:
        '200':
          description: Table created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CodedResult'
                  - type: object
                    properties:
                      tb:
                        type: string

  /api/config/tables/sort:
    post:
      tags: [config]
      summary: Update table display order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tables]
              properties:
                tables:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Order updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/config/table/{tb}:
    get:
      tags: [config]
      summary: Get full configuration for a table
      parameters:
        - $ref: '#/components/parameters/tb'
      responses:
        '200':
          description: Table config
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      table:
                        $ref: '#/components/schemas/TableConfig'
    put:
      tags: [config]
      summary: Save table-level properties (label, order, preview, rs, links…)
      parameters:
        - $ref: '#/components/parameters/tb'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TableConfig'
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'
    patch:
      tags: [config]
      summary: Rename a table
      parameters:
        - $ref: '#/components/parameters/tb'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_name]
              properties:
                new_name:
                  type: string
      responses:
        '200':
          description: Rename result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'
    delete:
      tags: [config]
      summary: Delete a table and its data
      parameters:
        - $ref: '#/components/parameters/tb'
      responses:
        '200':
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/config/table/{tb}/fields:
    get:
      tags: [config]
      summary: List all fields for a table
      parameters:
        - $ref: '#/components/parameters/tb'
      responses:
        '200':
          description: Field list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      fields:
                        type: array
                        items:
                          $ref: '#/components/schemas/FieldConfig'

  /api/config/table/{tb}/field:
    post:
      tags: [config]
      summary: Add a new field to a table
      parameters:
        - $ref: '#/components/parameters/tb'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FieldConfig'
      responses:
        '200':
          description: Field added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/config/table/{tb}/field/{fld}:
    put:
      tags: [config]
      summary: Save field properties
      parameters:
        - $ref: '#/components/parameters/tb'
        - $ref: '#/components/parameters/fld'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FieldConfig'
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'
    patch:
      tags: [config]
      summary: Rename a field
      parameters:
        - $ref: '#/components/parameters/tb'
        - $ref: '#/components/parameters/fld'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_name]
              properties:
                new_name:
                  type: string
      responses:
        '200':
          description: Rename result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'
    delete:
      tags: [config]
      summary: Delete a field
      parameters:
        - $ref: '#/components/parameters/tb'
        - $ref: '#/components/parameters/fld'
      responses:
        '200':
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/config/table/{tb}/fuzzy-date:
    post:
      tags: [config]
      summary: Activate the fuzzy-date (chronology) plugin for a table
      description: |
        Adds five `chrono_*` columns to the table's core SQL table
        (`chrono_from`, `chrono_to`, `chrono_label`, `chrono_certainty`,
        `chrono_period`) and sets `fuzzy_date: true` in the table config.

        Safe to call multiple times (idempotent — columns are only added if
        they do not yet exist).

        Requires `super_admin` privilege.
      parameters:
        - $ref: '#/components/parameters/tb'
      responses:
        '200':
          description: Activation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'
    delete:
      tags: [config]
      summary: Deactivate the fuzzy-date plugin for a table
      description: |
        Sets `fuzzy_date: false` in the table config. The five `chrono_*`
        columns are **not** dropped — existing data is preserved. The
        chronology panel disappears from RecordView until the plugin is
        re-activated.

        Requires `super_admin` privilege.
      parameters:
        - $ref: '#/components/parameters/tb'
      responses:
        '200':
          description: Deactivation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/config/field-structure:
    get:
      tags: [config]
      summary: Get the meta-structure that defines allowed field properties
      description: Used by the frontend to render the field editor form dynamically.
      responses:
        '200':
          description: Field structure definition
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      structure:
                        type: array
                        items:
                          type: object

  /api/config/validation:
    get:
      tags: [config]
      summary: Run the schema validation report
      responses:
        '200':
          description: Validation report
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      report:
                        type: array
                        items:
                          type: object
                          properties:
                            check:
                              type: string
                            status:
                              type: string
                              enum: [ok, warning, error]
                            message:
                              type: string

  /api/config/validation/fix:
    post:
      tags: [config]
      summary: Apply an automatic fix suggested by the validation report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [check]
              properties:
                check:
                  type: string
                  description: Name of the check to fix
      responses:
        '200':
          description: Fix result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/config/geoface:
    get:
      tags: [config]
      summary: Get GeoFace (map) configuration
      responses:
        '200':
          description: GeoFace config
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      config:
                        type: object
    put:
      tags: [config]
      summary: Save GeoFace configuration
      requestBody:
