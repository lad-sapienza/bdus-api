      summary: Delete a saved query
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  # ── API Keys ──────────────────────────────────────────────────────────────

  /api/api-keys:
    get:
      tags: [api-keys]
      summary: List API keys for the current application
      responses:
        '200':
          description: Key list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      keys:
                        type: array
                        items:
                          $ref: '#/components/schemas/ApiKey'
    post:
      tags: [api-keys]
      summary: Create a new API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, privilege]
              properties:
                label:
                  type: string
                privilege:
                  type: string
                  enum: [read, edit, admin]
      responses:
        '200':
          description: Key created — the raw key is returned only once
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CodedResult'
                  - type: object
                    properties:
                      key:
                        type: string
                        description: The raw API key value (shown once; store it securely)

  /api/api-key/{id}/revoke:
    post:
      tags: [api-keys]
      summary: Revoke (deactivate) an API key
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Revoke result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/api-key/{id}:
    delete:
      tags: [api-keys]
      summary: Permanently delete an API key
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  # ── Import ────────────────────────────────────────────────────────────────

  /api/import/{tb}/fields:
    get:
      tags: [import]
      summary: Get importable field list for a table
      parameters:
        - $ref: '#/components/parameters/tb'
      responses:
        '200':
          description: Field list for import mapping
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      fields:
                        type: array
                        items:
                          type: object

  /api/import/preview-file:
    post:
      tags: [import]
      summary: Upload a CSV/XLSX file and return column headers + sample rows
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: File preview
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      columns:
                        type: array
                        items:
                          type: string
                      preview:
                        type: array
                        items:
                          type: object

  /api/import/preview-photos:
    post:
      tags: [import]
      summary: Upload a ZIP of photos and return the file list
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Photo list preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/import/data:
    post:
      tags: [import]
      summary: Execute a tabular data import
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tb, mapping, file_token]
              properties:
                tb:
                  type: string
                mapping:
                  type: object
                  description: Source column → target field mapping
                file_token:
                  type: string
                  description: Token returned by preview-file
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/import/geojson:
    post:
      tags: [import]
      summary: Import GeoJSON geometries matched by a key field
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, tb, key_field]
              properties:
                file:
                  type: string
                  format: binary
                tb:
                  type: string
                key_field:
                  type: string
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/import/photos:
    post:
      tags: [import]
      summary: Execute a photo import from the uploaded ZIP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tb, key_field, file_token]
              properties:
                tb:
                  type: string
                key_field:
                  type: string
                file_token:
                  type: string
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  # ── Search & Replace ─────────────────────────────────────────────────────

  /api/search-replace/tables:
    get:
      tags: [search-replace]
      summary: List tables eligible for find-and-replace
      responses:
        '200':
          description: Table list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      tables:
                        type: array
                        items:
                          $ref: '#/components/schemas/TableMeta'

  /api/search-replace/{tb}/fields:
    get:
      tags: [search-replace]
      summary: List fields eligible for find-and-replace in a table
      parameters:
        - $ref: '#/components/parameters/tb'
      responses:
        '200':
          description: Field list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      fields:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            label:
                              type: string

  /api/search-replace:
    post:
      tags: [search-replace]
      summary: Execute a find-and-replace operation
      description: Replaces all occurrences of `search` with `replace` in `fld` across all rows of `tb`. This operation is irreversible.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tb, fld, search]
              properties:
                tb:
                  type: string
                fld:
                  type: string
                search:
                  type: string
                replace:
                  type: string
                  description: Replacement string (empty string to delete matches)
                  default: ''
      responses:
        '200':
          description: Replace result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CodedResult'
                  - type: object
                    properties:
                      affected:
                        type: integer
                        description: Number of rows updated

  # ── Free SQL ──────────────────────────────────────────────────────────────

  /api/free-sql/verify:
    post:
      tags: [free-sql]
      summary: Verify the super-admin password before entering free SQL mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        '200':
          description: Password verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/free-sql/run:
    post:
      tags: [free-sql]
      summary: Execute a raw SQL statement
      description: Only available to super_admin users after password verification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sql]
              properties:
                sql:
                  type: string
      responses:
        '200':
          description: Query result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CodedResult'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                      affected:
                        type: integer

  # ── Migrations ───────────────────────────────────────────────────────────────

  /api/migrations:
    get:
      tags: [migrations]
      summary: List all known migrations and their status
      description: |
        Returns the full ordered list of registered database migrations with their
        applied status. Requires admin privilege.
      responses:
        '200':
          description: Migration list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      total:
                        type: integer
                        description: Total number of known migrations
                      applied:
                        type: integer
                        description: Number of migrations already applied
                      migrations:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              description: Migration identifier (e.g. `M001_add_user_table_privs`)
                            applied:
                              type: boolean
                            applied_at:
                              type: string
                              nullable: true
                              description: Timestamp (`YYYY-MM-DD HH:MM:SS`) or null if not applied

  # ── Config relations ──────────────────────────────────────────────────────────

  /api/config/relations:
    get:
      tags: [config-relations]
      summary: List all FK relation definitions
      description: |
        Returns every row in `bdus_cfg_relations`, enriched with table labels.
        Each row represents one FK column: `from_tb.from_col → to_tb.to_col`.
        Super-admin only.
      responses:
        '200':
          description: Relation list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CodedSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Relation'
    post:
      tags: [config-relations]
      summary: Create a new FK relation and apply it to the database
      description: |
        Creates a new FK relation.  `from_tb` is always the table that holds
        the FK column (`from_col`); `to_tb` is the referenced table.

        **No alphabetical normalisation** — direction is preserved exactly as
        given.  UNIQUE constraint is on `(from_tb, from_col)`: one column can
        only reference one parent.

        Self-referential relations (`from_tb == to_tb`) are allowed; their
        `on_delete` is forced to `RESTRICT` and `on_update` to `CASCADE`.

        If orphan rows are found in `from_tb.from_col` the config row is still
        saved but the DB FK constraint is **not** applied; the response status
        is `warning` with code `relation_saved_orphans_found` and an `orphans`
        count.  Use `POST /api/config/apply-constraints` after cleaning the
        data to apply the constraint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelationInput'
      responses:
        '200':
          description: Relation created (or saved with orphan warning)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CodedSuccess'
                  - type: object
                    properties:
                      id:
                        type: integer
                      orphans:
                        type: integer
                        description: Number of orphan rows (present only when status=warning)

  /api/config/relations/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    put:
      tags: [config-relations]
      summary: Update to_tb, to_col, on_delete, on_update for an existing relation
      description: |
        `from_tb` and `from_col` are immutable (they identify the FK column).
        Only `to_tb`, `to_col`, `on_delete`, and `on_update` may be updated.
        The old FK constraint is dropped and re-applied with the new parameters.
        Orphan detection applies as with POST.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelationInput'
      responses:
        '200':
          description: Relation updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CodedSuccess'
                  - type: object
                    properties:
                      id:
                        type: integer
                      orphans:
                        type: integer
    delete:
      tags: [config-relations]
      summary: Delete a relation and drop the FK constraint from the database
      responses:
        '200':
          description: Relation deleted or not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/config/apply-constraints:
    post:
      tags: [config-relations]
      summary: Apply all pending FK constraints and indexes to the database
      description: |
        Iterates `bdus_cfg_relations` and `bdus_cfg_indexes` and applies any
        constraints/indexes not yet present in the DB.  Rows with orphan data
        are skipped (reported in `errors`).

        Useful after a v4 migration or after cleaning up orphan records.
        Super-admin only.
      responses:
        '200':
          description: Constraints applied (partial success possible)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CodedSuccess'
                  - type: object
                    properties:
                      applied:
                        type: integer
                      skipped:
                        type: integer
                      errors:
                        type: array
                        items:
                          type: object
                          properties:
                            from_tb:
                              type: string
                            from_col:
                              type: string
                            reason:
                              type: string

  # ── Config indexes ─────────────────────────────────────────────────────────────

  /api/config/table/{tb}/indexes:
    parameters:
      - $ref: '#/components/parameters/tb'
    get:
      tags: [config-indexes]
      summary: List user-defined indexes for a table
      responses:
        '200':
          description: Index list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/IndexDef'
    post:
      tags: [config-indexes]
      summary: Create a new index on a table
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IndexInput'
      responses:
        '200':
          description: Index created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CodedSuccess'
                  - type: object
                    properties:
                      id:
                        type: integer

  /api/config/table/{tb}/indexes/{id}:
    parameters:
      - $ref: '#/components/parameters/tb'
      - $ref: '#/components/parameters/id'
    delete:
      tags: [config-indexes]
      summary: Delete an index
      responses:
        '200':
          description: Index deleted or not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  # ── Zotero ────────────────────────────────────────────────────────────────────

  /api/zotero/libs:
    get:
      tags: [zotero]
      summary: List configured Zotero libraries
      description: Returns all libraries; `api_key` is redacted (replaced by `has_api_key`). Admin only.
      responses:
        '200':
          description: Library list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      libs:
                        type: array
                        items:
                          $ref: '#/components/schemas/ZoteroLib'

  /api/zotero/lib:
    post:
      tags: [zotero]
      summary: Add a Zotero library
      description: Registers a Zotero user or group library. Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, zotero_id, name]
              properties:
                type:
                  type: string
                  enum: [user, group]
                zotero_id:
                  type: string
                  description: Numeric Zotero user/group ID
                name:
                  type: string
                  description: Display name for this library
                api_key:
                  type: string
                  description: Zotero API key (required for private libraries)
                citation_style:
                  type: string
                  description: CSL style name (default `chicago-author-date`)
      responses:
        '200':
          description: Library added
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CodedSuccess'
                  - type: object
                    properties:
                      id:
                        type: integer

  /api/zotero/lib/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    delete:
      tags: [zotero]
      summary: Delete a Zotero library
      description: Deletes the library and all its citation links (CASCADE). Admin only.
      responses:
        '200':
          description: Library deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/zotero/search:
    get:
      tags: [zotero]
      summary: Proxy a full-text search to the Zotero API
      description: Requires edit privilege.
      parameters:
        - name: lib_id
          in: query
          required: true
          schema:
            type: integer
          description: ID of the configured Zotero library to search
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Full-text query string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Search results (or API error)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          type: object
                          properties:
                            key:
                              type: string
                            author_year:
                              type: string
                              description: Short author–year label
                            full_citation:
                              type: string
                              description: Formatted HTML citation
                            zotero_version:
                              type: integer
                              nullable: true
                            zotero_url:
                              type: string
                              nullable: true
                            title:
                              type: string

  /api/zotero/links/{tb}/{id}:
    parameters:
      - $ref: '#/components/parameters/tb'
      - $ref: '#/components/parameters/id'
    get:
      tags: [zotero]
      summary: Get all Zotero citation links for a record
      description: Returns links ordered by `sort`. Requires read privilege.
      responses:
        '200':
          description: Link list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      links:
                        type: array
                        items:
                          $ref: '#/components/schemas/ZoteroLink'

  /api/zotero/link:
    post:
      tags: [zotero]
      summary: Add a Zotero citation link to a record
      description: |
        Fetches and caches the citation from Zotero immediately on add.
        Requires edit privilege.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tb, record_id, lib_id, zotero_key]
              properties:
                tb:
                  type: string
                record_id:
                  type: integer
                lib_id:
                  type: integer
                zotero_key:
                  type: string
                pages:
                  type: string
                  nullable: true
                notes:
                  type: string
                  nullable: true
                sort:
                  type: integer
                  nullable: true
      responses:
        '200':
          description: Link added
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CodedSuccess'
                  - type: object
                    properties:
                      id:
                        type: integer

  /api/zotero/link/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    patch:
      tags: [zotero]
      summary: Update pages, notes or sort order of a citation link
      description: Requires edit privilege.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pages:
                  type: string
                  nullable: true
                notes:
                  type: string
                  nullable: true
                sort:
                  type: integer
                  nullable: true
      responses:
        '200':
          description: Link updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'
    delete:
      tags: [zotero]
      summary: Delete a citation link
      description: Requires edit privilege.
      responses:
        '200':
          description: Link deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodedResult'

  /api/zotero/sync/{tb}/{id}:
    parameters:
      - $ref: '#/components/parameters/tb'
      - $ref: '#/components/parameters/id'
    post:
      tags: [zotero]
      summary: Sync citation cache for all links on a single record
      description: |
        Re-fetches citations from Zotero for every link attached to this record.
        Designed to run in the background after record load. Requires edit privilege.
      responses:
        '200':
          description: Sync result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      updated:
                        type: integer
                        description: Number of links whose citation was refreshed
                      detached:
                        type: integer
                        description: Number of links whose Zotero item no longer exists

  /api/zotero/sync:
    post:
      tags: [zotero]
      summary: Bulk-sync citation cache for all libraries (admin)
      description: |
        Re-fetches citations for every unique `(lib_id, zotero_key)` pair referenced
        in the database. Admin only. May be slow on large datasets.
      responses:
        '200':
          description: Bulk sync result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      total:
                        type: integer
                        description: Unique items evaluated
                      updated:
                        type: integer
                      detached:
                        type: integer

  # ── Widgets ───────────────────────────────────────────────────────────────────

  /api/widgets:
    get:
      tags: [widgets]
      summary: List available widget names for the current app
      description: |
        Returns the sorted list of widget names found in `projects/{app}/widgets/*.js`.
        An empty array is returned when the directory does not exist.
        Requires read privilege.
      responses:
        '200':
          description: Widget list
          content:
            application/json:
              schema:
                type: object
                properties:
                  widgets:
                    type: array
                    items:
                      type: string
                    description: Sorted list of widget names (filename without `.js`)

  /api/widget/{name}:
    parameters:
      - name: name
        in: path
        required: true
        description: Widget name — lowercase letters, digits and dashes only
        schema:
          type: string
          pattern: '^[a-z0-9\-]+$'
    get:
      tags: [widgets]
      summary: Serve a widget JS file
      description: |
        Returns the widget's ES module source with `Content-Type: application/javascript`.
        Cached for 5 minutes (`Cache-Control: private, max-age=300`).
        Requires read privilege.
      responses:
        '200':
          description: Widget JS source
          content:
            application/javascript:
              schema:
                type: string
        '400':
          description: Invalid widget name
        '404':
          description: Widget not found

# ──────────────────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT obtained from POST /api/auth/login. Valid for 2 hours; refresh via GET /api/auth/refresh.

  parameters:
    tb:
      name: tb
      in: path
      required: true
      description: Table name (unprefixed, e.g. `us`, `periodi`)
      schema:
        type: string
        pattern: '^[a-z][a-z0-9_]*$'
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    fld:
      name: fld
      in: path
      required: true
      description: Field name
      schema:
        type: string
    file:
      name: file
      in: path
      required: true
      description: Backup filename (may contain path separators)
      schema:
        type: string

  schemas:

    # ── Common responses ───────────────────────────────────────────────────

    Success:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [success]

    Error:
      type: object
      required: [status, code]
      properties:
        status:
          type: string
          enum: [error]
        code:
          type: string
          description: i18n key identifying the error
        detail:
          type: string
          description: Optional human-readable detail

    CodedSuccess:
      allOf:
        - $ref: '#/components/schemas/Success'
        - type: object
          required: [code]
          properties:
            code:
              type: string

    CodedResult:
      oneOf:
        - $ref: '#/components/schemas/CodedSuccess'
        - $ref: '#/components/schemas/Error'

    # ── Records ────────────────────────────────────────────────────────────

    FieldValue:
      type: object
      description: A single field's value as returned by getRecord()
      properties:
        val:
          description: The stored value
        label:
          type: string
          description: Human-readable field label
        type:
          type: string
          description: Field type (text, textarea, date, select, …)
        readonly:
          type: boolean
        options:
          type: array
          description: Available options (for select/multi_select fields)
          items:
            type: object

    RecordResponse:
      allOf:
        - $ref: '#/components/schemas/Success'
        - type: object
          properties:
            core:
              type: object
              description: Main table fields — field name → FieldValue
              additionalProperties:
                $ref: '#/components/schemas/FieldValue'
            plugins:
              type: object
              description: Plugin table name → array of plugin rows
              additionalProperties:
                type: array
                items:
                  type: object
            links:
              type: array
              description: Manual links to other records
              items:
                type: object
            files:
              type: array
              description: Attached files
              items:
                type: object
            metadata:
              type: object
              properties:
                id:
                  type: integer
                tb:
                  type: string
                can_edit:
                  type: boolean
                can_delete:
                  type: boolean

    RecordListResponse:
      allOf:
        - $ref: '#/components/schemas/Success'
        - type: object
          required: [total, data]
          properties:
            total:
              type: integer
              description: Total matching records (before pagination)
            data:
              type: array
              description: Current page of records (flat key→value objects)
              items:
                type: object
                properties:
                  id:
                    type: integer
                additionalProperties: true
            tb:
              type: string
            page:
              type: integer
            limit:
              type: integer

    AdvancedSearchRow:
      type: object
      required: [fld, operator, value]
      properties:
        fld:
          type: string
          description: 'Field reference in the format `table:field`'
        operator:
          type: string
          example: '='
        value:
          type: string
        connector:
          type: string
          enum: [AND, OR]
          default: AND
        '(':
          type: string
          default: ''
        ')':
          type: string
          default: ''

    FilterObject:
      type: object
      description: |
        Directus-compatible JSON filter object.  Accepted in POST bodies and
        as URL bracket notation (`?filter[field][_op]=value`) in GET requests.

        ## Field condition
        ```json
        { "status": { "_eq": "active" }, "year": { "_gt": 100 } }
        ```
        Root-level conditions are AND-combined.

        ## Logical groups
        ```json
        { "_or": [ {"type": {"_eq": "site"}}, {"type": {"_eq": "find"}} ] }
        { "_and": [ {"year": {"_gte": 100}}, {"year": {"_lte": 300}} ] }
        ```

        ## Supported operators
        | Operator | SQL equivalent |
        |---|---|
        | `_eq` | `= ?` |
        | `_neq` | `!= ?` |
        | `_lt` | `< ?` |
        | `_lte` | `<= ?` |
        | `_gt` | `> ?` |
        | `_gte` | `>= ?` |
        | `_contains` | `LIKE '%?%'` (case-insensitive) |
        | `_icontains` | `LIKE '%?%'` (case-insensitive) |
        | `_ncontains` | `NOT LIKE '%?%'` |
        | `_starts_with` | `LIKE '?%'` |
        | `_ends_with` | `LIKE '%?'` |
        | `_in` | `IN (…)` |
        | `_nin` | `NOT IN (…)` |
        | `_null` | `IS NULL` / `IS NOT NULL` (value: `true`/`false`) |
        | `_nnull` | `IS NOT NULL` / `IS NULL` (value: `true`/`false`) |
        | `_between` | `BETWEEN ? AND ?` (value: two-element array) |
        | `_empty` | `IS NULL OR = ''` (convenience alias) |
        | `_nempty` | `IS NOT NULL AND != ''` (convenience alias) |
        | `_chrono_overlap` | Fuzzy-date overlap (value: `[low, high]` integer years). Must be applied to `chrono_from`. Generates a three-branch condition covering normal ranges, ante quem (`chrono_from IS NULL`) and post quem (`chrono_to IS NULL`) records. Requires the fuzzy-date plugin to be active on the table. |

        Field names are validated against the table config allow-list.
        All values are bound via PDO prepared statements — no SQL injection risk.
      additionalProperties: true
      example:
        _and:
          - periodo:
              _eq: Basso Medioevo
          - cronologia:
              _gte: 1000

    # ── Tables ─────────────────────────────────────────────────────────────

    TableMeta:
      type: object
      required: [name, label]
      properties:
        name:
          type: string
        label:
          type: string
        is_plugin:
          type: string
          enum: ['0', '1']

    TableConfig:
      allOf:
        - $ref: '#/components/schemas/TableMeta'
        - type: object
          properties:
            order:
              type: string
              description: Default sort field
            id_field:
              type: string
            preview:
              type: array
              items:
                type: string
              description: Fields shown in record list preview
            rs:
              type: string
              description: Field used as label in stratigraphic relations
            plugin:
              type: array
              items:
                type: string
              description: Plugin table names attached to this table
            link:
              type: array
              items:
                type: object
                properties:
                  other_tb:
                    type: string
                  fld:
                    type: string

    # ── Fields ─────────────────────────────────────────────────────────────

    FieldConfig:
      type: object
      required: [name, label, type, db_type]
      properties:
        name:
          type: string
        label:
          type: string
        type:
          type: string
          enum:
            - text
            - textarea
            - date
            - integer
            - float
            - boolean
            - select
            - multi_select
            - combo_select
            - slider
            - link_to
            - link_out
            - long_text
        db_type:
          type: string
          enum: [TEXT, INTEGER, REAL]
        readonly:
          oneOf:
            - type: boolean
            - type: string
              enum: ['0', '1']
        hide:
          oneOf:
            - type: boolean
            - type: string
              enum: ['0', '1']
        check:
          type: array
          items:
            type: string
          description: Validation rules (e.g. `not_empty`)
        vocabulary_set:
          type: string
        id_from_tb:
          type: string
          description: For link_to fields — source table

    # ── Charts ─────────────────────────────────────────────────────────────

    ChartDefinition:
      type: object
      required: [tb, type]
      properties:
        tb:
          type: string
        type:
          type: string
          enum: [metric, bar, line, pie, doughnut]
        field:
          type: string
          description: Aggregate field (metric charts only)
        function:
          type: string
          enum: [COUNT, SUM, AVG, MIN, MAX]
          description: Aggregate function (metric charts only)
        x_field:
          type: string
          description: Group-by field (non-metric charts)
        y_field:
          type: string
          description: Aggregate field (non-metric charts)
        y_function:
          type: string
          enum: [COUNT, SUM, AVG, MIN, MAX]
          description: Aggregate function (non-metric charts)
        filter:
          type: object
          description: Optional WHERE filter in the same search-type format used by getRecords()
      examples:
        - tb: us
          type: pie
          x_field: periodo
          y_field: id
          y_function: COUNT
        - tb: us
          type: metric
          field: id
          function: COUNT

    Chart:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        definition:
          $ref: '#/components/schemas/ChartDefinition'
        is_global:
          type: integer
          enum: [0, 1]
        user_id:
          type: integer
        owned_by_me:
          type: boolean
        tb_label:
          type: string
        created_at:
          type: integer
          description: Unix timestamp

    # ── Users ──────────────────────────────────────────────────────────────

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        privilege:
          type: integer
          description: |
            Privilege level (lower = more privileged):
            1=super_admin, 5=admin, 10=adm, 20=edit, 25=create, 30=read
        oauth_provider:
          type: string
          nullable: true
          description: OAuth2 provider slug ('google', 'orcid') if the user has linked an external identity
          example: google
        oauth_sub:
          type: string
          nullable: true
          description: Provider-issued unique subject ID (linked to oauth_provider)

    UserInput:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            password:
              type: string
              description: Required when creating; omit to keep existing password

    TablePrivilege:
      type: object
      required: [tb, privilege]
      properties:
        id:
          type: integer
        tb:
          type: string
        privilege:
          type: integer
        where_sql:
          type: string
          description: Optional row-level SQL WHERE clause

    # ── API Keys ───────────────────────────────────────────────────────────

    ApiKey:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
        privilege:
          type: string
          enum: [read, edit, admin]
        is_active:
          type: integer
          enum: [0, 1]
        created_at:
          type: integer
        last_used_at:
          type: [integer, "null"]

    # ── Versions ──────────────────────────────────────────────────────────

    VersionEntry:
      type: object
      description: Metadata for a single version snapshot entry.
      properties:
        id:
          type: integer
          description: Version entry primary key
        userid:
          type: string
          description: ID or name of the user who triggered the snapshot
        time:
          type: string
          format: date-time
          description: Timestamp of the snapshot (Y-m-d H:i:s)
        operation:
          type: string
          enum: [update, delete, restore]
          description: >
            What triggered the snapshot:
            `update` — a field edit; `delete` — the record was erased;
            `restore` — a rollback was applied to this record.

    VersionContent:
      type: object
      description: Full record snapshot captured at a point in time.
      properties:
        core:
          type: [object, "null"]
          description: >
            Flat field→value map of the main table row.
            `null` when the record has since been deleted.
          additionalProperties: true
        plugins:
          type: object
          description: >
            Plugin table name → array of raw DB rows at snapshot time.
          additionalProperties:
            type: array
            items:
              type: object
              additionalProperties: true

    # ── Config relations ───────────────────────────────────────────────────

    FkPolicy:
      type: string
      enum: [CASCADE, RESTRICT, 'SET NULL', 'NO ACTION']
      description: FK referential action policy

    Relation:
      type: object
      description: One FK relation — from_tb.from_col → to_tb.to_col
      properties:
        id:
          type: integer
        from_tb:
          type: string
          description: Table that holds the FK column (the "child")
        from_col:
          type: string
          description: FK column in from_tb
        from_label:
          type: string
        to_tb:
          type: string
          description: Referenced table (the "parent")
        to_col:
          type: string
          description: Referenced column in to_tb (usually `id`)
        to_label:
          type: string
        on_delete:
          $ref: '#/components/schemas/FkPolicy'
        on_update:
          $ref: '#/components/schemas/FkPolicy'

    RelationInput:
      type: object
      required: [from_tb, from_col, to_tb, to_col]
      properties:
        from_tb:
          type: string
          description: Table holding the FK column
        from_col:
          type: string
          description: FK column in from_tb
        to_tb:
          type: string
          description: Referenced table
        to_col:
          type: string
          description: Referenced column in to_tb
        on_delete:
          $ref: '#/components/schemas/FkPolicy'
        on_update:
          $ref: '#/components/schemas/FkPolicy'

    IndexDef:
      type: object
      properties:
        id:
          type: integer
        tb:
          type: string
        name:
          type: string
        columns:
          type: array
          items:
            type: string
        is_unique:
          type: boolean

    IndexInput:
      type: object
      required: [name, columns]
      properties:
        name:
          type: string
          description: Index name (must be unique per table)
        columns:
          type: array
          items:
            type: string
          description: Ordered list of columns included in the index
        is_unique:
          type: boolean
          default: false

    # ── Zotero ─────────────────────────────────────────────────────────────

    ZoteroLib:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [user, group]
        zotero_id:
          type: string
        name:
          type: string
        citation_style:
          type: string
        has_api_key:
          type: boolean
          description: True when an API key is stored (key itself is never returned)

    ZoteroLink:
      type: object
      properties:
        id:
          type: integer
        tb:
          type: string
        record_id:
          type: integer
        lib_id:
          type: integer
        zotero_key:
          type: string
        author_year:
          type: string
          nullable: true
          description: Cached short author–year label
        full_citation:
          type: string
          nullable: true
          description: Cached formatted HTML citation
        pages:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        sort:
          type: integer
          nullable: true
        zotero_version:
          type: integer
          nullable: true
        synced_at:
          type: integer
          nullable: true
          description: Unix timestamp of last cache sync
        detached:
          type: integer
          description: 1 when the Zotero item no longer exists
        zotero_url:
          type: string
          nullable: true
          description: Public URL to the item on zotero.org (null for user libraries)
