# Test-only Compose override — used exclusively by test.sh.
#
# docker compose -p bdus-test -f docker-compose.yml -f docker-compose.test.yml up -d
#
# Key differences from the dev compose:
#   - Port 8081 (avoids collision with a running dev container on 8080)
#   - BRADYPUS_ALLOW_NEW_APP=1 required by Hurl Phase 1 (create-app)
#   - projects/ uses a named Docker volume (bdus_test_projects) instead of
#     the host bind-mount, so dev apps never bleed into the test run.
#     `docker compose down --volumes` removes it automatically after each run.
#   - bradypus-net declared external so the test project reuses the
#     shared network without the "not created for this project" warning
services:
  app:
    ports:
      - "8081:80"
    environment:
      - BRADYPUS_DEBUG=1
      - BRADYPUS_ALLOW_NEW_APP=1
      - BRADYPUS_CORS_ORIGIN=http://localhost:5173
    volumes:
      - bdus_test_projects:/var/www/html/projects

volumes:
  bdus_test_projects:

networks:
  bradypus-net:
    external: true
