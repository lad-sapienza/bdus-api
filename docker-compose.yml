services:

  # PHP/Apache backend — serves the existing app and the JSON API bridge
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      - BRADYPUS_DEBUG=1   # set to 0 (or remove) in production
      # Uncomment the line below to enable the "Create new application" wizard.
      # Remove it again once the application has been created.
      # - BRADYPUS_ALLOW_NEW_APP=1
    volumes:
      # Live source mount: changes on host are immediately reflected
      - .:/var/www/html
      # Bind-mount the host projects/ folder so existing projects are visible
      - ./projects:/var/www/html/projects

  # Node/Vite dev server — only started with: docker compose --profile vue up
  node:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    # Vite must listen on 0.0.0.0 to be reachable from outside the container
    command: sh -c "npm install && npm run dev"
    profiles:
      - vue
